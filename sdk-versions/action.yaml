name: SDK version matrix
description: Provides centralized Senzing SDK version matrix for CI workflows.
author: support@senzing.com

outputs:
  senzingsdk-versions:
    description: JSON array of Senzing SDK versions to test
    value: ${{ steps.versions.outputs.senzingsdk-versions }}

runs:
  using: composite
  steps:
    - name: Set SDK versions
      id: versions
      shell: bash
      run: |
        echo 'senzingsdk-versions=["production-v4","staging-v4","4.3.0"]' >> "$GITHUB_OUTPUT"
