# Dependabot configuration for build-resources
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    assignees:
      - "kernelsam"
    cooldown:
      default-days: 21
      # `exclude` is the correct cooldown key (NOT `exclude-patterns`, which is
      # groups-only). The old key voided the whole cooldown block, so Dependabot
      # applied no cooldown — that's how checkout v7.0.0 was merged release-day.
      exclude:
        - "senzing-factory/*"
    directory: "/"
    groups:
      senzing-factory:
        patterns:
          - "senzing-factory/*"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "deps(actions):"
