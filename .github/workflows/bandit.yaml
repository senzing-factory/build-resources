name: Bandit

on:
  workflow_call:
    inputs:
      python-version:
        default: "3.13"
        description: Python version to use for running Bandit
        required: false
        type: string
      targets:
        default: src
        description: Space-separated list of directories to scan
        required: false
        type: string

permissions: {}

jobs:
  bandit:
    name: Bandit
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Run Bandit
        env:
          BANDIT_TARGETS: ${{ inputs.targets }}
        run: |
          pip install bandit
          IFS=' ' read -ra targets <<< "$BANDIT_TARGETS"
          bandit -r "${targets[@]}"
