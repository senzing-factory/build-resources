name: add to project

on:
  workflow_call:
    inputs:
      org:
        required: true
        type: string
      project-number:
        required: true
        type: string
    secrets:
      # Legacy PAT path — DEPRECATED, removed in v5. Provide EITHER this OR the
      # GitHub App pair below (App takes precedence when present).
      PROJECT_RW_TOKEN:
        required: false
      APP_CLIENT_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      SLACK_BOT_TOKEN:
        required: false
      SLACK_CHANNEL:
        required: false

permissions: {}

jobs:
  add-to-project:
    name: add to project
    permissions:
      repository-projects: write
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

    steps:
      # Transitional dual auth (v4): prefer the GitHub App; fall back to the PAT.
      - name: Select auth mode
        id: auth
        env:
          APP_CLIENT_ID: ${{ secrets.APP_CLIENT_ID }}
          PAT: ${{ secrets.PROJECT_RW_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$APP_CLIENT_ID" ]; then
            echo "mode=app" >> "$GITHUB_OUTPUT"
          elif [ -n "$PAT" ]; then
            echo "::warning::Using the deprecated PROJECT_RW_TOKEN PAT; migrate to the GitHub App (APP_CLIENT_ID/APP_PRIVATE_KEY) before v5."
            echo "mode=pat" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Provide either APP_CLIENT_ID + APP_PRIVATE_KEY (preferred) or PROJECT_RW_TOKEN."
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        if: steps.auth.outputs.mode == 'app'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.org }}

      - name: add to project
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.PROJECT_RW_TOKEN }}
          project-url: "https://github.com/orgs/${{inputs.org}}/projects/${{inputs.project-number}}"

      - name: Notify Slack on failure
        if: (failure() || cancelled()) && env.SLACK_BOT_TOKEN != ''
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
