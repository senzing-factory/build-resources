name: add labels to issue

on:
  workflow_call:
    secrets:
      ORG_MEMBERSHIP_TOKEN:
        required: false
      MEMBERS:
        required: false
      SLACK_BOT_TOKEN:
        required: false
      SLACK_CHANNEL:
        required: false

permissions: {}

jobs:
  add-customer-submission-label:
    name: add customer-submission label
    permissions:
      issues: write
    runs-on: ubuntu-latest

    steps:
      - name: Add customer-submission label
        if: ${{ env.MEMBER == 'false' }}
        uses: andymckay/labeler@1.0.4
        with:
          add-labels: "customer-submission"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_MEMBERSHIP_TOKEN || github.token }}
          MEMBER: ${{ contains( secrets.MEMBERS, github.actor ) }}

      - name: Notify Slack on failure
        if: failure() && env.SLACK_TOKEN != ''
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}

  add-triage-label:
    name: add triage label
    permissions:
      issues: write
    runs-on: ubuntu-latest

    steps:
      - name: add triage label
        uses: andymckay/labeler@1.0.4
        with:
          add-labels: "triage"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_TOKEN != ''
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
