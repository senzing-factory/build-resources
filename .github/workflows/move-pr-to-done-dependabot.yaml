name: move pr to done dependabot

on:
  workflow_call:
    inputs:
      project:
        description: Project ID (classic projects not supported).
        required: true
        type: string
    secrets:
      # Dual auth (v4): pass EITHER the PAT (deprecated) OR the App pair.
      PROJECT_RW_TOKEN:
        required: false
      APP_CLIENT_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false

permissions: {}

jobs:
  move-pr-to-done-column:
    if: ${{ github.event.pull_request.merged == true || github.event.action  == 'closed' }}
    permissions:
      repository-projects: write
    secrets:
      PROJECT_RW_TOKEN: ${{ secrets.PROJECT_RW_TOKEN }}
      APP_CLIENT_ID: ${{ secrets.APP_CLIENT_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    uses: senzing-factory/build-resources/.github/workflows/set-project-item-status.yaml@299-skern
    with:
      org: ${{ github.repository_owner }}
      project-number: ${{ inputs.project }}
      pr-node-id: ${{ github.event.pull_request.node_id }}
      status: Done
