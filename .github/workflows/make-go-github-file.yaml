name: make go github file

on:
  workflow_call:
    secrets:
      GIT_ACTOR:
        required: true
      GPG_PASSPHRASE:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      SLACK_BOT_TOKEN:
        required: false
      SLACK_CHANNEL:
        required: false

permissions: {}

jobs:
  make-go-github-file:
    name: update cmd/github.go
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

    steps:
      - name: checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          git_commit_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: make github.go file
        uses: senzing-factory/github-action-make-go-github-file@v2
        with:
          actor: ${{ secrets.GIT_ACTOR }}

      - name: Notify Slack on failure
        if: (failure() || cancelled()) && env.SLACK_BOT_TOKEN != ''
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
