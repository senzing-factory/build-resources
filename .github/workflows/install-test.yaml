name: install test

on: [push]

permissions:
  contents: read

jobs:
  install-test:
    runs-on: ubuntu-latest
    steps:
      - name: install Senzing API
        uses: senzing-factory/github-action-install-senzing-api@65-skern
        with:
          packages-to-install: "senzingapi-poc"
          senzingapi-version: "4.0.0-24276"