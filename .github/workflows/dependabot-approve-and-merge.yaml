name: dependabot approve and merge

on:
  workflow_call:
    inputs:
      update-type:
        description: "Semantic version update type: minor or patch. 'major' is disabled by policy — major bumps are never auto-approved/merged."
        default: "patch"
        required: false
        type: string
    secrets:
      CODEOWNER_PR_RW_TOKEN:
        required: true

permissions: {}

jobs:
  dependabot-approve-and-merge:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: verify input
        env:
          UPDATE_TYPE: ${{ inputs.update-type }}
        run: |
          case "${UPDATE_TYPE}" in
            "minor"|"patch")
              echo "[INFO] Update type found."
              ;;
            "major")
              echo "[ERROR] Automated approval/merge of 'major' updates is disabled by policy; handle major version bumps manually."
              exit 1
              ;;
            *)
              echo "[ERROR] Update type provided is not one of: minor, patch."
              exit 1
              ;;
          esac

      - name: dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: approve ${{ inputs.update-type }} version PRs
        env:
          GH_TOKEN: ${{ secrets.CODEOWNER_PR_RW_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          UPDATE_TYPE: ${{ inputs.update-type }}
        if: ${{ contains(steps.dependabot-metadata.outputs.update-type, inputs.update-type) && steps.dependabot-metadata.outputs.update-type != 'version-update:semver-major' }}
        run: |
          gh pr review --approve "$PR_URL" -b "Automated: **approving** this pull request because **it includes a ${UPDATE_TYPE} update**"

      - name: auto merge ${{ inputs.update-type }} version PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ contains(steps.dependabot-metadata.outputs.update-type, inputs.update-type) && steps.dependabot-metadata.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr merge --auto --squash "$PR_URL"
