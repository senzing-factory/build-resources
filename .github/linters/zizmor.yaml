rules:
  unpinned-uses:
    config:
      policies:
        # Third-party actions MUST be pinned to a full commit SHA (immutable).
        "*": hash-pin
        # First-party reusables are consumed at the moving major tag by design.
        "senzing-factory/*": ref-pin
  secrets-outside-env:
    ignore:
      - add-to-project.yaml
      - add-labels-to-issue.yaml
      - add-to-project-dependabot.yaml
      - claude-pull-request-review.yaml
      - make-go-github-file.yaml
      # Project reusables that pass the App/PAT secrets to nested actions; same
      # pattern as add-to-project above (reusables can't use environments).
      - move-pr-to-done.yaml
      - set-project-item-status.yaml
